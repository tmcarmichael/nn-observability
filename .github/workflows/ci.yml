name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Ruff check
        run: uv run ruff check src/ scripts/ analysis/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ scripts/ analysis/ tests/

      - name: Vulture dead code check
        run: uv run vulture src/ scripts/ analysis/ scripts/vulture_whitelist.py --min-confidence 90

      - name: Path-bug pattern check (f-string /workspace/ interpolation)
        run: |
          matches=$(grep -n -e 'f"/workspace/' -e "f'/workspace/" scripts/*.py || true)
          if [ -n "$matches" ]; then
            echo "FAIL: f-string interpolation of /workspace/ detected."
            echo "Use the canonical _resolve_out helper from scripts/run_model.py."
            echo ""
            echo "$matches"
            exit 1
          fi

      - name: Croissant generator diff
        run: uv run python scripts/generate_croissant.py --check

      - name: Croissant JSON-LD validation
        run: uvx --quiet --from "mlcroissant==1.1.0" mlcroissant validate --jsonld croissant.json

      - name: Croissant Dataset round-trip
        run: |
          uvx --quiet --from "mlcroissant==1.1.0" python -c '
          from mlcroissant import Dataset
          ds = Dataset(jsonld="croissant.json")
          rs = list(ds.metadata.record_sets)
          assert rs, "no record sets parsed from croissant.json"
          ids = [r.id for r in rs]
          assert "main-results-records" in ids, f"main-results-records missing; got {ids}"
          print(f"Round-trip OK: {ds.metadata.name} v{ds.metadata.version}, {len(rs)} record sets")
          '

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Type check
        run: uv run mypy analysis/ src/observe.py src/probe.py src/utils.py scripts/run_model.py scripts/verify_manifest_revisions.py --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest tests/ -v --hypothesis-profile=ci

      - name: Validate canonical provenance
        run: uv run python analysis/load_results.py --strict

      - name: Check version consistency
        run: |
          TOML_V=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG_V=$(git tag -l 'v*' --sort=-v:refname | head -1 | sed 's/^v//')
          if [ -n "$TAG_V" ] && [ "$TOML_V" != "$TAG_V" ]; then
            echo "ERROR: pyproject.toml ($TOML_V) != latest tag (v$TAG_V)"
            exit 1
          fi
          echo "Version: $TOML_V (matches tag)"

  manifest-verify:
    # Verifies every commit hash in results/model_revisions.json still
    # resolves on Hugging Face. Public repos are checked unauthenticated;
    # gated repos (Llama, Mistral) return "gated_no_access" without an
    # HF_TOKEN secret and are not counted as failures by the script.
    # A failure here means a manifest entry has drifted (repo deleted,
    # commit garbage-collected, or revision rewritten).
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies (transformer extra for huggingface_hub)
        run: uv sync --extra transformer

      - name: Verify manifest revisions
        run: uv run python scripts/verify_manifest_revisions.py
