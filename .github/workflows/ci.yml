name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Ruff check
        run: uv run ruff check src/ scripts/ analysis/

      - name: Ruff format check
        run: uv run ruff format --check src/ scripts/ analysis/

      - name: Vulture dead code check
        run: uv run vulture src/ analysis/ scripts/vulture_whitelist.py --min-confidence 90

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Type check
        run: uv run mypy analysis/ src/observe.py src/probe.py src/utils.py --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest tests/ -v --hypothesis-profile=ci

      - name: Check version consistency
        run: |
          TOML_V=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG_V=$(git tag -l 'v*' --sort=-v:refname | head -1 | sed 's/^v//')
          if [ -n "$TAG_V" ] && [ "$TOML_V" != "$TAG_V" ]; then
            echo "ERROR: pyproject.toml ($TOML_V) != latest tag (v$TAG_V)"
            exit 1
          fi
          echo "Version: $TOML_V (matches tag)"
