name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Ruff check
        run: uv run ruff check src/ scripts/ figures/ analysis/

      - name: Ruff format check
        run: uv run ruff format --check src/ scripts/ figures/ analysis/

      - name: Run unit tests
        run: uv run pytest tests/ -v --ignore=tests/test_smoke_run_model.py

  smoke-test:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Smoke test run_model.py (GPT-2 124M, CPU)
        run: uv run pytest tests/test_smoke_run_model.py -v --timeout=600

      - name: Check version consistency
        run: |
          TOML_V=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG_V=$(git tag -l 'v*' --sort=-v:refname | head -1 | sed 's/^v//')
          if [ -n "$TAG_V" ] && [ "$TOML_V" != "$TAG_V" ]; then
            echo "WARNING: pyproject.toml ($TOML_V) != latest tag (v$TAG_V)"
          else
            echo "Version: $TOML_V (matches tag)"
          fi
