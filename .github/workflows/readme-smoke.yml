name: README Quickstart

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  readme-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install (README step 1)
        run: uv sync

      - name: Run tests (README step 2)
        run: uv run pytest tests/ -q

      - name: Run analysis (README step 3)
        run: uv run python analysis/run_all.py
