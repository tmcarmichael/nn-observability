repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        args: [--fix]
        files: '^(src|scripts|analysis|tests)/.*\.py$'
      - id: ruff-format
        files: '^(src|scripts|analysis|tests)/.*\.py$'

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: end-of-file-fixer
        exclude_types: [jupyter, json, binary, image]
      - id: trailing-whitespace
        exclude_types: [jupyter, binary, image]

  - repo: local
    hooks:
      - id: validate-schemas
        name: validate result JSONs against dispatched JSON Schemas
        entry: uv run python scripts/validate_schemas.py --strict
        language: system
        files: '^(results/.*\.json|schema/.*\.schema\.json|scripts/validate_schemas\.py)$'
        pass_filenames: false

      - id: check-version
        name: check pyproject.toml version matches git tag
        entry: |
          bash -c '
            toml_v=$(grep "^version" pyproject.toml | head -1 | sed "s/.*\"\(.*\)\"/\1/")
            tag_v=$(git tag -l "v*" --sort=-v:refname | head -1 | sed "s/^v//")
            if [ -n "$tag_v" ] && [ "$toml_v" != "$tag_v" ]; then
              echo "WARNING: pyproject.toml ($toml_v) != latest tag (v$tag_v)"
            fi
          '
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: typecheck
        name: mypy type check (analysis + core library)
        entry: just typecheck
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: deadcode
        name: vulture dead code check
        entry: just deadcode
        language: system
        pass_filenames: false
        stages: [pre-push]
